name: Tests

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-test-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-test-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run common tests
        run: ./gradlew common:test --stacktrace

      - name: Publish test summary
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          # Gradle writes JUnit XML here for every test task.
          files: |
            **/build/test-results/test/*.xml
          # Render results in the workflow Summary panel + a Check on the commit.
          # Do not fail the workflow here even if tests failed — the gradle step already did that.
          comment_mode: off
          check_name: Unit tests
          report_individual_runs: true
          # Skip annotations to keep the PR UI tidy; the summary table is enough.
          annotations_limit: 0

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
          retention-days: 7
