# Edit visual block. You can see ore through block.

# The display name of cheat
name: "Xray"

# enable/disable detection
active: true

# Maximum of ping to be verified.
# It's to prevent lagging player
ping: 300

# The minimum porcent to create reliability
reliability_alert: 60

# Manage the kick of players
kick:
  active: false
  # Required alert to kick player
  alert: 5

# Remove the cheat effect
set_back:
  active: false
  # To know how to configure, check this wiki :
  # https://github.com/Elikill58/Negativity/wiki/setBack
  action: []

# Option for /negativity verif
verif:
  # Enable/disable the detection when the verification is enabled
  check_in_verif: true

# Override global configuration
ban:
  active: false
  reliability_need: 95
  alert_need: 10
  time:
    # %reliability% : reliability of last alert
    # %alert% : number of alert sent
    calculator: "360000000 + (%reliability% * 20 * %alert%)"

# Disable one check and not all detections
checks:
  # Count minerate
  minerate:
    active: true
  # Suspiciously lucky mining turns toward hidden rare ores
  mining-direction:
    active: true
    # Cos of the angle between two digging directions under which it counts as a turn (0.7 = ~45 degrees)
    turn_cos: 0.7
    # How far (blocks) to search for a hidden rare ore along the new direction
    lucky_distance: 6
    # Minimum direction changes before judging the luck ratio
    min_turns: 5
    # Percent of lucky turns to create an alert (legit blind mining stays far below)
    lucky_percent: 60
