import com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar

evaluationDependsOn(':common')

repositories {
    // MCProtocolLib lives here, not Maven Central.
    maven { url = 'https://repo.opencollab.dev/maven-releases/' }
    maven { url = 'https://repo.opencollab.dev/maven-snapshots/' }
}

sourceSets {
    main {
        java.srcDirs = ['src']
        resources.srcDirs = ['resources']
    }
    manualTest {
        java.srcDirs = ['testSrc']
        resources.srcDirs = ['testResources']
        // IMPORTANT: do NOT inherit sourceSets.main.output here.
        //   The harness loads Negativity via the extension JAR using Hollowcube's ExtensionClassLoader.
        //   If `com.elikill58.negativity.minestom.MinestomNegativity` is also on the parent classpath,
        //   parent-first delegation wins, the extension's self-check
        //   `getClassLoader() instanceof ExtensionClassLoader` fails at startup, and Minestom crashes
        //   with "Extension class loader is not an ExtensionClassLoader".
        //   :common is wired explicitly below as a project dep on the manualTest configuration so its
        //   runtime classpath (including processed resources like assets/negativity/config.yml) is
        //   available to AlertRecorder + UniversalUtils.loadConfig.
    }
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

dependencies {
    api project(':common')
    compileOnly 'com.github.Minestom:Minestom:2025.10.05-1.21.8'
    // https://mvnrepository.com/artifact/dev.hollowcube/minestom-ce-extensions
	compileOnly 'dev.hollowcube:minestom-ce-extensions:1.2.0'

    compileOnly 'io.netty:netty-all:4.1.110.Final'

    // Manual integration test only — NEVER run as part of :test / CI.
    // Pulls Minestom & extension loader at runtime so the standalone server can boot.
    manualTestImplementation project(':common')
    manualTestImplementation 'com.github.Minestom:Minestom:2025.10.05-1.21.8'
    manualTestImplementation 'dev.hollowcube:minestom-ce-extensions:1.2.0'
    manualTestImplementation 'io.netty:netty-all:4.1.110.Final'
    manualTestImplementation 'org.slf4j:slf4j-simple:2.0.13'
    // Required by net.minestom.dependencies.maven.MavenRepository (Kotlin); not pulled transitively.
    manualTestImplementation 'org.jetbrains.kotlin:kotlin-stdlib:2.0.21'

    // Auto-bot client to drive scenarios end-to-end without a real Minecraft client / LiquidBounce.
    manualTestImplementation 'org.geysermc.mcprotocollib:protocol:1.21.7-1'
}

processResources {
    inputs.property "version", project.version

    filesMatching("extension.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

shadowJar {
    archiveBaseName.set('NegativityMinestom')
    archiveAppendix.set('1.21')
    archiveClassifier.set(null)

    mergeServiceFiles()
    from(project(':common').tasks.shadowJar)
}

build.dependsOn shadowJar

parent.tasks.named('shadowJar', ShadowJar) {
    it.from(shadowJar.outputs)
}

task prepareServer(type: Copy) {
    from shadowJar
    rename { 'negativity.jar' }
    def pluginDir = System.getProperty('plugins.dir')
    if (pluginDir == null) {
        enabled(false)
    } else {
        into pluginDir
    }
}

// =====================================================================
// Manual integration test harness.
//
// Not bound to :test or :check. Run explicitly:
//     ./gradlew :minestom:manualTest [-Pport=25565] [-Pworld=flat]
//
// Workflow:
//   1. ./gradlew :shadowJar                  (builds NegativityMinestom-1.21.jar)
//   2. ./gradlew :minestom:manualTest        (starts Minestom server with extension loaded)
//   3. Operator connects with a legit client + a LiquidBounce client (offline mode)
//   4. Follows testResources/MANUAL_TEST_PLAN.md, then types `report` in the test console
// =====================================================================
task manualTestPrepareExtension(type: Copy) {
    dependsOn shadowJar
    from shadowJar
    rename { 'negativity.jar' }
    into "${buildDir}/manual-test-server/extensions"
}

task manualTest(type: JavaExec) {
    group = 'verification'
    description = 'Boot a standalone Minestom server with Negativity loaded for manual integration testing. NOT part of :check.'
    dependsOn manualTestPrepareExtension
    dependsOn sourceSets.manualTest.classesTaskName

    // Pin to JDK 21. JavaExec does not inherit `java.toolchain` from the java extension by default,
    // so it can pick whatever JAVA_HOME / first JDK Gradle discovers (e.g. 22) and break Minestom.
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(21)
    }

    mainClass.set('com.elikill58.negativity.minestom.manualtest.ManualTestServer')
    classpath = sourceSets.manualTest.runtimeClasspath
    workingDir = file("${buildDir}/manual-test-server")
    standardInput = System.in

    systemProperty 'minestom.use-new-chunk-sending', 'true'
    systemProperty 'manualtest.port', findProperty('port') ?: '25565'
    systemProperty 'manualtest.world', findProperty('world') ?: 'flat'
}

// Headless variant: runs LegitBot + CheatBot, writes the report, and shuts down.
// Exit code = 0 (every phase passed), 1 (at least one phase failed), 2 (server failed to come up).
// Wire this into CI when you want a smoke check on every PR.
task manualTestAuto(type: JavaExec) {
    group = 'verification'
    description = 'Headless end-to-end manual test: LegitBot, then CheatBot, then report, then shutdown. Exit code reflects PASS/FAIL.'
    dependsOn manualTestPrepareExtension
    dependsOn sourceSets.manualTest.classesTaskName

    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(21)
    }

    mainClass.set('com.elikill58.negativity.minestom.manualtest.ManualTestServer')
    classpath = sourceSets.manualTest.runtimeClasspath
    workingDir = file("${buildDir}/manual-test-server")
    // stdin is intentionally NOT bound — the harness exits on its own.

    systemProperty 'minestom.use-new-chunk-sending', 'true'
    systemProperty 'manualtest.port', findProperty('port') ?: '25565'
    systemProperty 'manualtest.world', findProperty('world') ?: 'flat'
    systemProperty 'manualtest.auto', 'true'

    // Surface PASS/FAIL via the gradle task exit code without printing a noisy stack trace.
    ignoreExitValue = false
}
